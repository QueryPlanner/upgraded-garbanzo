# =============================================================================
# Base Docker Compose Configuration
# =============================================================================
# This file contains shared configuration for both dev and prod environments.
# Do not use directly - use docker-compose.dev.yml or docker-compose.prod.yml
#
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.base.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  telegram-bot:
    # Image is set in environment-specific compose files
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGENT_NAME=${AGENT_NAME:-garbanzo-agent}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # ADK session artifacts
      - agent_artifacts:/app/src/.adk
      # SQLite databases for reminders and fitness tracking
      - agent_data:/app/src/agent/data
      # Context files: USER.md, IDENTITY.md, SOUL.md
      - agent_context:/app/src/.context
      # Agent memory log (MEMORY.md)
      - agent_memory:/app/memory
      # Garbanzo home: repos, configs, caches, Playwright browsers, extra tools
      - garbanzo_home:/home/app/garbanzo-home
    command: python -m agent.telegram.bot

volumes:
  agent_artifacts:
  agent_data:
  agent_context:
  agent_memory:
  garbanzo_home:
