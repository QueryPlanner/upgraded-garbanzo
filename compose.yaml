services:
  telegram-bot:
    image: ghcr.io/queryplanner/google-adk-on-bare-metal:main
    build: .
    environment:
      - AGENT_NAME=telegram-agent
      - LOG_LEVEL=INFO
      # DATABASE_URL, API Keys, and TELEGRAM_BOT_TOKEN loaded from .env
    env_file:
      - .env
    volumes:
      - agent_artifacts:/app/src/.adk
    restart: always
    command: python -m agent.telegram.bot

volumes:
  agent_artifacts: