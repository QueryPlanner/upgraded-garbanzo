# ============================================================
# Data persistence via Docker named volumes
# ============================================================
# Reminders and fitness data (calories, workouts) are stored in
# SQLite files inside the `agent_data` named volume.
#
# Named volumes SURVIVE redeployment:
#   docker compose up -d   ← safe: volumes are preserved
#   docker compose down    ← safe: volumes are preserved
#
# ⚠️  WARNING — DATA LOSS:
#   docker compose down -v ← DESTROYS all volumes (reminders, fitness,
#                             ADK artifacts, context). Use only when you
#                             intentionally want to wipe all agent data.
# ============================================================

services:
  telegram-bot:
    image: ${IMAGE}
    build: .
    environment:
      - AGENT_NAME=telegram-agent
      - LOG_LEVEL=INFO
      # API keys and TELEGRAM_BOT_TOKEN loaded from .env
    env_file:
      - .env
    volumes:
      # ADK session artifacts
      - agent_artifacts:/app/src/.adk
      # SQLite databases for reminders and fitness tracking
      - agent_data:/app/src/agent/data
      # Context files: USER.md, IDENTITY.md, SOUL.md
      - agent_context:/app/src/.context
    restart: always
    command: python -m agent.telegram.bot

volumes:
  agent_artifacts:
  agent_data:
  agent_context:
