# =============================================================================
# Production Environment Docker Compose
# =============================================================================
# Usage:
#   Start:   docker compose -f docker-compose.prod.yml up -d
#   Stop:    docker compose -f docker-compose.prod.yml down
#   Logs:    docker compose -f docker-compose.prod.yml logs -f
#   Rebuild: docker compose -f docker-compose.prod.yml up -d --build
#
# Services:
#   - telegram-bot: Polls Telegram for messages (no port needed)
#   - api: FastAPI web interface and health endpoint (port 3000)
#
# Environment: INFO logging, auto-restart enabled
# =============================================================================

name: garbanzo-prod

services:
  telegram-bot:
    image: ${IMAGE:-garbanzo-prod:latest}
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - garbanzo-prod:latest
    container_name: garbanzo-prod-bot
    env_file:
      - .env.prod
    environment:
      - AGENT_NAME=prod-agent
      - LOG_LEVEL=INFO
    volumes:
      - prod_agent_artifacts:/app/src/.adk
      - prod_agent_data:/app/src/agent/data
      - prod_agent_context:/app/src/.context
      - prod_agent_memory:/app/memory
      - prod_garbanzo_home:/home/app/garbanzo-home
    restart: unless-stopped  # Auto-restart on failure or system reboot
    labels:
      - "environment=production"
      - "project=garbanzo"
      - "service=telegram-bot"
    command: python -m agent.telegram.bot
    profiles:
      - bot
      - all

  api:
    image: ${IMAGE:-garbanzo-prod:latest}
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - garbanzo-prod:latest
    container_name: garbanzo-prod-api
    env_file:
      - .env.prod
    environment:
      - AGENT_NAME=prod-agent
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=3000
      - SERVE_WEB_INTERFACE=true
      - RELOAD_AGENTS=false
    ports:
      - "3000:3000"
    volumes:
      - prod_agent_artifacts:/app/src/.adk
      - prod_agent_data:/app/src/agent/data
      - prod_agent_context:/app/src/.context
      - prod_agent_memory:/app/memory
      - prod_garbanzo_home:/home/app/garbanzo-home
    restart: unless-stopped
    labels:
      - "environment=production"
      - "project=garbanzo"
      - "service=api"
    command: python -m agent.server
    profiles:
      - api
      - all

volumes:
  prod_agent_artifacts:
    name: garbanzo-prod_agent_artifacts
  prod_agent_data:
    name: garbanzo-prod_agent_data
  prod_agent_context:
    name: garbanzo-prod_agent_context
  prod_agent_memory:
    name: garbanzo-prod_agent_memory
  prod_garbanzo_home:
    name: garbanzo-prod_garbanzo_home
